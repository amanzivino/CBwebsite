  width: 100%;
  max-width: 920px;
  margin: 0 auto 56px;

.cb-ba {
  position: relative;
  width: 100%;
  margin: 0 auto 18px;

  border-radius: 8px;
  overflow: hidden;
  user-select: none;
  touch-action: pan-y;
  box-shadow: 0 30px 80px -30px rgba(0,0,0,0.55);
  cursor: ew-resize;
}
.cb-ba-collage {
  position: relative;
  width: 100%;
  margin: 0 auto 18px;
  aspect-ratio: 4 / 3;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 30px 80px -30px rgba(0,0,0,0.55);
}
.cb-ba-collage-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.cb-ba-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
}
.cb-ba-after {
  clip-path: inset(0 0 0 var(--pos, 50%));
  -webkit-clip-path: inset(0 0 0 var(--pos, 50%));
}
.cb-ba-divider {
  position: absolute; top: 0; bottom: 0;
  left: var(--pos, 50%);
  width: 2px;
  background: #F8E2B6;
  transform: translateX(-1px);
  pointer-events: none;
  box-shadow: 0 0 0 1px rgba(59,31,16,0.25);
}
.cb-ba-handle {
  position: absolute;
  top: 50%;
  left: var(--pos, 50%);
  width: 52px; height: 52px;
  margin: -26px 0 0 -26px;
  border-radius: 999px;
  background: #F8E2B6;
  border: 2px solid #3B1F10;
  display: flex; align-items: center; justify-content: center;
  cursor: ew-resize;
  color: #3B1F10;
  font: 700 18px/1 var(--font-body);
  letter-spacing: 0.04em;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  transition: transform 200ms ease, box-shadow 200ms ease;
}
.cb-ba-handle:hover,
.cb-ba-handle:focus-visible {
  transform: scale(1.08);
  outline: none;
  box-shadow: 0 6px 22px rgba(0,0,0,0.35), 0 0 0 4px rgba(248,226,182,0.45);
}
.cb-ba-label {
  position: absolute;
  top: 18px;
  font: 700 10px/1 var(--font-body);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(248,226,182,0.92);
  color: #3B1F10;
  pointer-events: none;
}
.cb-ba-label-before { left: 18px; }
.cb-ba-label-after  { right: 18px; }
.cb-ba-nav {
  display: grid;
  grid-template-columns: auto 1fr auto;
  grid-template-areas: 'prev meta next' 'dots dots dots';
  align-items: center;
  column-gap: 18px;
  row-gap: 14px;
  padding: 0 4px;
}
.cb-ba-arrow {
  appearance: none;
  background: transparent;
  border: 1px solid rgba(248,226,182,0.45);
  color: #F8E2B6;
  width: 44px; height: 44px;
  border-radius: 999px;
  font: 400 22px/1 var(--font-display);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
}
.cb-ba-arrow:first-of-type { grid-area: prev; }
.cb-ba-arrow:nth-of-type(2) { grid-area: next; }
.cb-ba-arrow:hover,
.cb-ba-arrow:focus-visible {
  background: rgba(248,226,182,0.10);
  border-color: rgba(248,226,182,0.85);
  outline: none;
  transform: translateY(-1px);
}
.cb-ba-meta {
  grid-area: meta;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-align: center;
}
.cb-ba-count {
  font: 700 10px/1 var(--font-body);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(248,226,182,0.55);
  font-variant-numeric: tabular-nums;
}
.cb-ba-pair-label {
  font: 300 17px/1.25 var(--font-body);
  color: #F8E2B6;

}
.cb-ba-dots {
  grid-area: dots;
  display: flex; justify-content: center; gap: 10px;
}
.cb-ba-dot {
  appearance: none;
  width: 8px; height: 8px;
  border-radius: 999px;
  border: 1px solid rgba(248,226,182,0.55);
  background: transparent;
  padding: 0;
  cursor: pointer;
  transition: background 180ms ease, transform 180ms ease, border-color 180ms ease;
}
.cb-ba-dot:hover,
.cb-ba-dot:focus-visible {
  border-color: rgba(248,226,182,0.95);
  outline: none;
}
.cb-ba-dot.is-active {
  background: #F8E2B6;
  border-color: #F8E2B6;
  transform: scale(1.15);
}
