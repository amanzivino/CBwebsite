  clip-path: inset(0 0 0 var(--pos, 50%));

}
.cb-ba-divider {
  position: absolute; top: 0; bottom: 0;

  width: 2px;

  transform: translateX(-1px);
  pointer-events: none;
  box-shadow: 0 0 0 1px rgba(59,31,16,0.25);

const BeforeAfter = () => {
  const [pos, setPos] = React.useState(50);
  const [idx, setIdx] = React.useState(0);
  const ref = React.useRef(null);
  const dragging = React.useRef(false);
  const pair = BEFORE_AFTER[idx];
  const isCollage = pair.isCollage;
  const goTo = (i) => {
    const next = ((i % BEFORE_AFTER.length) + BEFORE_AFTER.length) % BEFORE_AFTER.length;
    setIdx(next);
    setPos(50);
  };
  const prev = () => goTo(idx - 1);
  const next = () => goTo(idx + 1);

  const setFromClientX = (clientX) => {
    const el = ref.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const raw = ((clientX - rect.left) / rect.width) * 100;
    const next = Math.max(0, Math.min(100, raw));
    setPos(next);
  };

  const onPointerDown = (e) => {
    dragging.current = true;
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
    setFromClientX(e.clientX);
  };
  const onPointerMove = (e) => {
    if (!dragging.current) return;
    setFromClientX(e.clientX);
  };
  const onPointerUp = (e) => {
    dragging.current = false;
    try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (_) {}
  };
  const onKeyDown = (e) => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); setPos(p => Math.max(0, p - 4)); }
    if (e.key === 'ArrowRight') { e.preventDefault(); setPos(p => Math.min(100, p + 4)); }
    if (e.key === 'Home')       { e.preventDefault(); setPos(0); }
    if (e.key === 'End')        { e.preventDefault(); setPos(100); }
  };

  return (
    <div className="cb-ba-wrap">
      {isCollage ? (
        <figure className="cb-ba-collage">
          <img className="cb-ba-collage-img" src={pair.src} alt={pair.alt} />
          <figcaption style={{ position: 'absolute', left: -9999, top: 'auto' }}>
            {pair.label}
          </figcaption>
        </figure>
      ) : (
      <figure className="cb-ba"
        ref={ref}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerUp}
        style={{ '--pos': pos + '%' }}
      >
        <img className="cb-ba-img" src={pair.before.src} alt={pair.before.alt} key={'b' + idx}/>
        <img className="cb-ba-img cb-ba-after" src={pair.after.src} alt={pair.after.alt} key={'a' + idx}/>
        <span className="cb-ba-label cb-ba-label-before" aria-hidden="true">Before</span>
        <span className="cb-ba-label cb-ba-label-after" aria-hidden="true">After</span>
        <div className="cb-ba-divider" aria-hidden="true"/>
        <div className="cb-ba-handle"
          role="slider"
          tabIndex={0}
          aria-label={'Reveal before and after — ' + pair.label}
          aria-valuemin={0}
          aria-valuemax={100}
          aria-valuenow={Math.round(pos)}
          aria-valuetext={Math.round(pos) + ' percent after revealed'}
          onKeyDown={onKeyDown}
        >‹›</div>
        <figcaption style={{ position: 'absolute', left: -9999, top: 'auto' }}>
          Drag the handle to compare before and after of a Ciao Bella color transformation: {pair.label}.
        </figcaption>
      </figure>
      )}
      <div className="cb-ba-nav" role="group" aria-label="Browse transformations">
        <button type="button" className="cb-ba-arrow" onClick={prev} aria-label="Previous transformation">‹</button>
        <div className="cb-ba-meta" aria-live="polite">
          <span className="cb-ba-count">{String(idx + 1).padStart(2, '0')} / {String(BEFORE_AFTER.length).padStart(2, '0')}</span>
          <span className="cb-ba-pair-label">{pair.label}</span>
        </div>
        <button type="button" className="cb-ba-arrow" onClick={next} aria-label="Next transformation">›</button>
        <div className="cb-ba-dots" role="tablist" aria-label="Choose transformation">
          {BEFORE_AFTER.map((p, i) => (
            <button key={i} type="button" role="tab"
              className={'cb-ba-dot' + (i === idx ? ' is-active' : '')}
              aria-selected={i === idx}
              aria-label={'Transformation ' + (i + 1) + ' — ' + p.label}
              onClick={() => goTo(i)}/>
          ))}
        </div>
      </div>
    </div>
  );
};

// ─── Contact ──────────────────────────────────────────────────────────────────
const Contact = ({ tweaks }) => {
  const [form, setForm] = React.useState({ name: '', phone: '', message: '' });
  const [status, setStatus] = React.useState('idle');
  const [errors, setErrors] = React.useState({});

  const updateField = (key, value) => {
    setForm(f => ({ ...f, [key]: value }));
    setErrors(current => {
      if (!current[key]) return current;
      const next = { ...current };
      delete next[key];
      return next;
    });
    if (status === 'error') setStatus('idle');
  };

  const validateForm = () => {
    const next = {};
    const digits = form.phone.replace(/\D/g, '');
    if (!form.name.trim()) next.name = 'Please enter your first name.';
    if (!digits) next.phone = 'Please enter your phone number.';
    else if (digits.length < 10) next.phone = 'Please enter a 10-digit phone number.';
    if (!form.message.trim()) next.message = 'Tell us a little about what you need.';
    return next;
  };

  const handleSubmit = async e => {
    e.preventDefault();
    const nextErrors = validateForm();
    if (Object.keys(nextErrors).length) {
      setErrors(nextErrors);
      setStatus('error');
      return;
    }
    setStatus('sending');
    const formData = new FormData();
    formData.append('Name', form.name);
    formData.append('Phone', form.phone);
    formData.append('Message', form.message);
    formData.append('_subject', `Ciao Bella website inquiry from ${form.name}`);
    formData.append('_replyto', form.phone);
    try {
      const res = await fetch('https://formspree.io/f/xrbeynqk', {
        method: 'POST', body: formData, headers: { 'Accept': 'application/json' },
      });
      if (res.ok) {
        setForm({ name: '', phone: '', message: '' });
        setErrors({});
        setStatus('sent');
        window.setTimeout(() => setStatus('idle'), 5200);
      } else {
        setStatus('error');
      }
    } catch (_) {
      setStatus('error');
    }
  };

  return (
    <section id="contact" data-screen-label="Contact" style={{ background: C.white, position: 'relative', overflow: 'hidden' }}>
      <BubbleBg opacity={0.05} flip/>
      <div className="cb-section-pad" style={{ maxWidth: 1280, margin: '0 auto', padding: '100px 80px', position: 'relative', zIndex: 1 }}>
          <div className="cb-grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'center' }}>

          {/* Left */}
          <div>
            <h2 style={{
              fontFamily: 'var(--font-display)', fontWeight: 400,
              fontSize: 'clamp(32px, 3.5vw, 52px)', color: C.deepBrown,
              lineHeight: 1.15, letterSpacing: '-0.01em', marginBottom: 20,
            }}>Let's talk<br/>about your hair.</h2>
            <CopperRule style={{ marginBottom: 28 }}/>
            <p style={{ fontFamily: 'var(--font-body)', fontSize: 14, lineHeight: 1.75, color: C.warmTaupe, marginBottom: 36 }}>
              Ready for a fresh look? Have questions about our services? We'd love to hear from you. Send us a message or call us directly.
            </p>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
              {[
                { icon: 'phone', label: 'Phone', value: ADDR.phone, href: LINKS.phone },
                { icon: 'pin', label: 'Address', value: <span><span>{ADDR.line1}</span><br/><span>{ADDR.line2}</span></span>, href: LINKS.directions },
                { icon: 'instagram', label: 'Instagram', value: '@ciaobellahairsalon', href: LINKS.instagram },
              ].map(item => (
                <a key={item.label} href={item.href} target={typeof item.href === 'string' && item.href.startsWith('http') ? '_blank' : undefined} rel="noopener"
                  style={{ display: 'flex', alignItems: 'center', gap: 16, textDecoration: 'none', color: 'inherit' }}>
                  <div style={{
                    width: 44, height: 44, borderRadius: '50%',
                    background: C.softBeige, flexShrink: 0,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>
                    <Icon name={item.icon} size={18} color={tweaks.accentColor}/>
                  </div>
                  <div>
                    <div style={{ fontFamily: 'var(--font-body)', fontWeight: 600, fontSize: 10, letterSpacing: '0.15em', textTransform: 'uppercase', color: C.lightTaupe }}>{item.label}</div>
                    <div style={{ fontFamily: 'var(--font-body)', fontSize: 14, color: C.deepBrown, fontWeight: 500 }}>{item.value}</div>
                  </div>
                </a>
              ))}
            </div>

            {/* Map embed — people have trouble finding us tucked away */}
            <div style={{
              marginTop: 32, borderRadius: 12, overflow: 'hidden',
              boxShadow: '0 4px 20px rgba(59,31,16,0.09)',
              border: `1px solid ${C.softBeige}`,
            }}>
              <iframe
                title="Ciao Bella Salon location map"
                 src="https://www.openstreetmap.org/export/embed.html?bbox=-82.3252,29.6482,-82.3234,29.65&amp;layer=mapnik&amp;marker=29.64907,-82.32429"
                width="100%" height="220" style={{ display: 'block', border: 0 }}
                loading="lazy"
                referrerPolicy="no-referrer-when-downgrade"
              />
            </div>
          </div>

          {/* Form */}
          <div className="cb-form-card" style={{ background: C.softBeige, borderRadius: 12, padding: '44px 40px', boxShadow: '0 4px 20px rgba(59,31,16,0.07)', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
            {status === 'sent' ? (
              <div role="status" aria-live="polite" style={{ textAlign: 'center', padding: '40px 0' }}>
                <div style={{
                  width: 64, height: 64, borderRadius: '50%',
                  background: tweaks.accentColor,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  margin: '0 auto 20px',
                }}>
                  <Icon name="check" size={28} color={C.white} sw={2}/>
                </div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 24, color: C.deepBrown, marginBottom: 8 }}>Message sent!</div>
                <div style={{ fontFamily: 'var(--font-body)', fontSize: 14, color: C.warmTaupe }}>We'll be in touch soon.</div>
              </div>
            ) : (
              <form noValidate onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 22, color: C.deepBrown, marginBottom: 4 }}>Send a Message</div>
                {status === 'error' && (
                  <div className="cb-form-alert" role="alert">Please fix the highlighted fields before sending.</div>
                )}
                {[
                  { key: 'name', label: 'First Name', placeholder: 'Your name', type: 'text', autoComplete: 'given-name' },
                  { key: 'phone', label: 'Phone Number', placeholder: '(352) 379-9200', type: 'tel', autoComplete: 'tel' },
                ].map(field => {
                  const id = `contact-${field.key}`;
                  const errorId = `${id}-error`;
                  const hasError = Boolean(errors[field.key]);
                  return (
                  <div key={field.key}>
                    <label htmlFor={id} style={{ fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: C.warmTaupe, display: 'block', marginBottom: 6 }}>{field.label}</label>
                    <input
                      id={id}
                      name={field.key}
                      type={field.type}
                      placeholder={field.placeholder}
                      autoComplete={field.autoComplete}
                      required
                      aria-invalid={hasError}
                      aria-describedby={hasError ? errorId : undefined}
                      value={form[field.key]}
                      onChange={e => updateField(field.key, e.target.value)}
                      style={{
                        width: '100%', minHeight: 44, padding: '12px 16px',
                        border: `1px solid ${hasError ? C.terracotta : C.lightTaupe}`, borderRadius: 4,
                        fontFamily: 'var(--font-body)', fontSize: 14, color: C.deepBrown,
                        background: C.white,
                        transition: 'border-color 200ms ease, box-shadow 200ms ease',
                        boxShadow: hasError ? '0 0 0 3px rgba(151,62,20,0.12)' : 'none',
                      }}
                      onFocus={e => e.target.style.borderColor = tweaks.accentColor}
                      onBlur={e => e.target.style.borderColor = hasError ? C.terracotta : C.lightTaupe}
                    />
                    {hasError && <div id={errorId} className="cb-field-error" role="alert">{errors[field.key]}</div>}
                  </div>
                  );
                })}
                <div>
                  <label htmlFor="contact-message" style={{ fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: C.warmTaupe, display: 'block', marginBottom: 6 }}>Message</label>
                  <textarea
                    id="contact-message"
                    name="message"
                    placeholder="How can we help you?"
                    rows={4}
                    required
                    aria-invalid={Boolean(errors.message)}
                    aria-describedby={errors.message ? 'contact-message-error' : undefined}
                    value={form.message}
                    onChange={e => updateField('message', e.target.value)}
                    style={{
                      width: '100%', minHeight: 132, padding: '12px 16px',
                      border: `1px solid ${errors.message ? C.terracotta : C.lightTaupe}`, borderRadius: 4,
                      fontFamily: 'var(--font-body)', fontSize: 14, color: C.deepBrown,
                      background: C.white, resize: 'vertical',
                      transition: 'border-color 200ms ease, box-shadow 200ms ease',
                      boxShadow: errors.message ? '0 0 0 3px rgba(151,62,20,0.12)' : 'none',
                    }}
                    onFocus={e => e.target.style.borderColor = tweaks.accentColor}
                    onBlur={e => e.target.style.borderColor = errors.message ? C.terracotta : C.lightTaupe}
                  />
                  {errors.message && <div id="contact-message-error" className="cb-field-error" role="alert">{errors.message}</div>}
                </div>
                <button type="submit" disabled={status === 'sending'} aria-live="polite" style={{
                  fontFamily: 'var(--font-body)', fontWeight: 700, fontSize: 12,
                  letterSpacing: '0.15em', textTransform: 'uppercase',
                  background: status === 'sending' ? C.warmTaupe : tweaks.accentColor, color: C.white,
                  padding: '14px 28px', borderRadius: 999, border: 'none', cursor: status === 'sending' ? 'not-allowed' : 'pointer',
                  transition: 'background 200ms ease, transform 120ms ease',
                  minHeight: 46,
                  opacity: status === 'sending' ? 0.82 : 1,
                }}
                  onMouseEnter={e => { if (status !== 'sending') e.currentTarget.style.background = C.chocolate; }}
                  onMouseLeave={e => { if (status !== 'sending') e.currentTarget.style.background = tweaks.accentColor; }}
                >{status === 'sending' ? 'Sending...' : 'Send Message'}</button>
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
};

// ─── App ──────────────────────────────────────────────────────────────────────
const App = () => {
  const tweaks = TWEAK_DEFAULTS;

  const [scrolled, setScrolled] = React.useState(false);
  const [activeSection, setActiveSection] = React.useState('hero');

  React.useEffect(() => {
    const handleScroll = () => {
      setScrolled(window.scrollY > 60);
      const sections = ['hero','about','services','ourwork','reviews','team','contact'];
      const found = sections.find(id => {
        const el = document.getElementById(id);
        if (!el) return false;
        const rect = el.getBoundingClientRect();
        return rect.top <= 80 && rect.bottom > 80;
      });
      if (found) setActiveSection(found);
    };
    window.addEventListener('scroll', handleScroll, { passive: true });
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  return (
    <div style={{position:'relative'}}>
      <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,
        background:`radial-gradient(circle at 18% 18%, rgba(59,31,16,0.34) 0 1px, transparent 1.2px),
                     radial-gradient(circle at 82% 62%, rgba(166,90,24,0.28) 0 1px, transparent 1.3px), var(--white)`,
        backgroundSize:'4px 4px,6px 6px,auto'}}/>
      <a className="skip-link" href="#main-content">Skip to content</a>
      <Ticker scrolled={scrolled}/>
      <Nav scrolled={scrolled} activeSection={activeSection} onNav={setActiveSection} tweaks={tweaks}/>
      <main id="main-content">
        <Hero tweaks={tweaks} onNav={setActiveSection}/>
        <About tweaks={tweaks}/>
        <Services tweaks={tweaks}/>
        <Gallery tweaks={tweaks}/>
        <GoogleReviews/>
        <Team tweaks={tweaks}/>
        <Contact tweaks={tweaks}/>
      </main>
      <Footer tweaks={tweaks}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
